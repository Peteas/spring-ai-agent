<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiMo Code Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0F172A;
            --bg-secondary: #1E293B;
            --bg-tertiary: #1E293B;
            --bg-elevated: #272F42;
            --bg-hover: #334155;
            --surface: #1E293B;
            --border: #475569;
            --border-light: #64748B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-tertiary: #64748B;
            --accent: #22C55E;
            --accent-light: #4ADE80;
            --accent-glow: rgba(34,197,94,0.15);
            --green: #22C55E;
            --green-glow: rgba(34,197,94,0.15);
            --red: #EF4444;
            --yellow: #FBBF24;
            --orange: #F97316;
            --sidebar-width: 280px;
            --header-height: 56px;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F1F5F9;
            --bg-elevated: #FFFFFF;
            --bg-hover: #E2E8F0;
            --surface: #F8FAFC;
            --border: #E2E8F0;
            --border-light: #CBD5E1;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-tertiary: #94A3B8;
            --accent: #16A34A;
            --accent-light: #15803D;
            --accent-glow: rgba(22,163,74,0.1);
            --green: #16A34A;
            --green-glow: rgba(22,163,74,0.1);
            --red: #DC2626;
            --yellow: #D97706;
            --orange: #EA580C;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ============ Layout ============ */
        .app {
            display: flex;
            height: 100vh;
        }

        /* ============ Sidebar ============ */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: white;
            box-shadow: 0 4px 12px rgba(108,92,231,0.3);
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
        }

        .brand-sub {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 400;
        }

        .sidebar-section {
            padding: 12px 12px 8px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 0 8px;
            margin-bottom: 6px;
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 10px 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(108,92,231,0.3);
        }

        .new-chat-btn:hover {
            background: var(--accent-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(108,92,231,0.4);
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 12px;
        }

        .session-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: var(--transition);
            margin-bottom: 2px;
        }

        .session-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .session-item.active {
            background: var(--accent-glow);
            color: var(--accent-light);
            border: 1px solid rgba(108,92,231,0.2);
        }

        .session-icon {
            width: 18px;
            height: 18px;
            opacity: 0.6;
            flex-shrink: 0;
        }

        .session-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .session-delete {
            display: none;
            width: 20px;
            height: 20px;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            border-radius: 4px;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .session-item:hover .session-delete {
            display: flex;
        }

        .session-delete:hover {
            color: var(--red);
            background: rgba(255,107,107,0.1);
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border);
        }

        .model-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .model-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--green);
        }

        /* ============ Main Chat Area ============ */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            height: var(--header-height);
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-secondary);
            backdrop-filter: blur(12px);
        }

        .chat-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .chat-actions {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        /* ============ Messages ============ */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            scroll-behavior: smooth;
        }

        .messages-inner {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .welcome {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent), #06b6d4);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
            box-shadow: 0 8px 32px rgba(108,92,231,0.25);
        }

        .welcome h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .welcome p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            max-width: 400px;
            margin: 0 auto;
        }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 28px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .suggestion {
            padding: 12px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            text-align: left;
            transition: var(--transition);
            font-family: inherit;
        }

        .suggestion:hover {
            border-color: var(--accent);
            color: var(--text-primary);
            background: var(--accent-glow);
        }

        /* Message bubbles */
        .msg {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: msgIn 0.3s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg.user .msg-avatar {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        .msg.assistant .msg-avatar {
            background: linear-gradient(135deg, var(--accent), #06b6d4);
        }

        .msg-body {
            flex: 1;
            min-width: 0;
        }

        .msg-role {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .msg-content {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-primary);
        }

        .msg.user .msg-content {
            background: var(--bg-elevated);
            padding: 12px 16px;
            border-radius: 4px var(--radius) var(--radius) var(--radius);
            border: 1px solid var(--border);
        }

        .msg.assistant .msg-content {
            padding: 4px 0;
        }

        .msg-content pre {
            background: #0F172A;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow-x: auto;
            margin: 12px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            position: relative;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #1E293B;
            border-bottom: 1px solid var(--border);
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
        }

        [data-theme="light"] .code-header {
            background: #F1F5F9;
        }

        .code-lang {
            font-size: 11px;
            color: var(--text-tertiary);
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .copy-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-tertiary);
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
        }

        .copy-btn:hover {
            color: var(--text-primary);
            border-color: var(--border-light);
            background: var(--bg-hover);
        }

        .copy-btn.copied {
            color: var(--green);
            border-color: var(--green);
        }

        .msg-content pre code {
            display: block;
            padding: 14px 16px;
            overflow-x: auto;
        }

        .code-line {
            display: block;
        }

        .code-line::before {
            content: attr(data-line);
            display: inline-block;
            width: 2.5em;
            text-align: right;
            padding-right: 12px;
            margin-right: 12px;
            color: var(--text-tertiary);
            border-right: 1px solid var(--border);
            user-select: none;
            opacity: 0.5;
        }

        [data-theme="light"] .msg-content pre {
            background: #F1F5F9;
            border-color: #E2E8F0;
        }

        [data-theme="light"] .msg-content code {
            background: rgba(0,0,0,0.06);
        }

        [data-theme="light"] .thinking {
            background: rgba(22,163,74,0.06);
            border-color: rgba(22,163,74,0.12);
        }

        [data-theme="light"] .tool-call {
            border-color: #E2E8F0;
        }

        [data-theme="light"] .msg.user .msg-content {
            background: #F1F5F9;
            border-color: #E2E8F0;
        }

        .msg-content code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            background: rgba(255,255,255,0.06);
            padding: 2px 6px;
            border-radius: 4px;
        }


        .msg-content p { margin-bottom: 8px; }
        .msg-content p:last-child { margin-bottom: 0; }
        .msg-content strong { color: var(--accent-light); font-weight: 600; }
        .msg-content ul, .msg-content ol { padding-left: 20px; margin: 8px 0; }
        .msg-content li { margin-bottom: 4px; }
        .msg-content h1, .msg-content h2, .msg-content h3,
        .msg-content h4, .msg-content h5, .msg-content h6 {
            margin: 16px 0 8px;
            font-weight: 600;
        }
        .msg-content h1 { font-size: 18px; }
        .msg-content h2 { font-size: 16px; }
        .msg-content h3 { font-size: 14px; }
        .msg-content h4 { font-size: 13px; }
        .msg-content h5 { font-size: 12px; }
        .msg-content h6 { font-size: 12px; color: var(--text-secondary); }

        .msg-content a {
            color: var(--accent-light);
            text-decoration: none;
        }
        .msg-content a:hover {
            text-decoration: underline;
        }

        .msg-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 12px;
            margin: 8px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        .msg-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 16px 0;
        }

        .msg-content del {
            color: var(--text-secondary);
        }

        .msg-content table {
            border-collapse: collapse;
            margin: 8px 0;
            width: 100%;
            font-size: 13px;
        }
        .msg-content th, .msg-content td {
            border: 1px solid var(--border);
            padding: 6px 10px;
            text-align: left;
        }
        .msg-content th {
            background: var(--bg-hover);
            font-weight: 600;
        }
        .msg-content tr:hover {
            background: var(--bg-hover);
        }

        /* Tool calls */
        .tool-call {
            margin: 10px 0;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--bg-tertiary);
        }

        .tool-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }

        .tool-header:hover {
            background: var(--bg-hover);
        }

        .tool-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .tool-icon.running {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .tool-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-light);
            font-family: 'JetBrains Mono', monospace;
            flex: 1;
        }

        .tool-status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        .tool-status.success {
            background: var(--green-glow);
            color: var(--green);
        }

        .tool-status.error {
            background: rgba(255,107,107,0.15);
            color: var(--red);
        }

        .tool-status.running {
            background: rgba(254,202,87,0.15);
            color: var(--yellow);
        }

        .tool-chevron {
            color: var(--text-tertiary);
            transition: transform var(--transition);
            font-size: 10px;
        }

        .tool-call.expanded .tool-chevron {
            transform: rotate(90deg);
        }

        .tool-body {
            display: none;
            padding: 0 14px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
            border-top: 1px solid var(--border);
            margin-top: 0;
            padding-top: 10px;
        }

        .tool-call.expanded .tool-body {
            display: block;
        }

        /* Thinking block */
        .thinking {
            margin: 10px 0;
            padding: 12px 16px;
            background: rgba(108,92,231,0.06);
            border: 1px solid rgba(108,92,231,0.15);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-tertiary);
            font-style: italic;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }

        .thinking::before {
            content: '💭 ';
        }

        /* System message */
        .msg-system {
            text-align: center;
            padding: 8px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .msg-system.error {
            color: var(--red);
            background: rgba(255,107,107,0.08);
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            margin: 8px 0;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: var(--text-tertiary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* ============ Input Area ============ */
        .input-area {
            padding: 16px 24px 24px;
            background: var(--bg-primary);
        }

        .input-container {
            max-width: 780px;
            margin: 0 auto;
        }

        .input-box {
            display: flex;
            align-items: flex-end;
            gap: 0;
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 4px;
            transition: var(--transition);
        }

        .input-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            padding: 10px 14px;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 200px;
            line-height: 1.5;
        }

        .input-box textarea::placeholder {
            color: var(--text-tertiary);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--accent-light);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .input-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 8px;
        }

        /* ============ Scrollbar ============ */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        /* ============ Message Actions ============ */
        .msg-actions {
            display: none;
            position: absolute;
            top: 0;
            right: 0;
            gap: 2px;
            z-index: 10;
        }

        .msg:hover .msg-actions {
            display: flex;
        }

        .msg-action-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-tertiary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 12px;
        }

        .msg-action-btn:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
            border-color: var(--border-light);
        }

        .msg-action-btn.copied {
            color: var(--green);
        }

        /* ============ Stop Button ============ */
        .send-btn.stop-mode {
            background: var(--red);
        }

        .send-btn.stop-mode:hover {
            background: #ff4757;
        }

        /* ============ Scroll to Bottom ============ */
        .scroll-bottom {
            position: fixed;
            bottom: 120px;
            right: 32px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            z-index: 50;
        }

        .scroll-bottom.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .scroll-bottom:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        /* ============ Mobile Hamburger ============ */
        .hamburger {
            display: none;
            width: 36px;
            height: 36px;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .hamburger:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
            backdrop-filter: blur(2px);
        }

        /* ============ Focus States ============ */
        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        button:focus-visible, a:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* ============ Cursor Pointer ============ */
        .suggestion, .session-item, .tool-header, .new-chat-btn, .icon-btn,
        .send-btn, .scroll-bottom, .hamburger, .msg-action-btn, .copy-btn,
        .session-delete {
            cursor: pointer;
        }

        /* ============ Streaming Cursor ============ */
        .streaming-cursor::after {
            content: '▊';
            animation: blink 0.8s infinite;
            color: var(--accent);
            margin-left: 1px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ============ Reduced Motion ============ */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .messages {
                scroll-behavior: auto;
            }
        }

        /* ============ Responsive ============ */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-overlay.open {
                display: block;
            }
            .hamburger {
                display: flex;
            }
            .suggestions { grid-template-columns: 1fr; }
            .scroll-bottom { right: 16px; bottom: 100px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">M</div>
                <div class="brand">
                    <span class="brand-name">MiMo Code</span>
                    <span class="brand-sub">AI Agent</span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-title">Conversations</div>
                <button class="new-chat-btn" onclick="newSession()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New Chat
                </button>
            </div>

            <div class="session-list" id="sessionList"></div>

            <div class="sidebar-footer">
                <div class="model-badge">
                    <span class="model-dot"></span>
                    <span>mimo-v2.5-pro</span>
                </div>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <!-- Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div style="display:flex;align-items:center;gap:8px;">
                    <button class="hamburger" onclick="toggleSidebar()" title="Menu">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <span class="chat-title" id="chatTitle">New Conversation</span>
                </div>
                <div class="chat-actions">
                    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle Theme">
                        <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                    <button class="icon-btn" onclick="newSession()" title="New Chat">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>
            </header>

            <div class="messages" id="messages">
                <div class="messages-inner">
                    <div class="welcome" id="welcome">
                        <div class="welcome-icon">M</div>
                        <h2>MiMo Code Agent</h2>
                        <p>Powered by Xiaomi MiMo v2.5 Pro. I can help you read, write, and search code, execute commands, manage git, and more.</p>
                        <div class="suggestions">
                            <button class="suggestion" onclick="useSuggestion(this)">List files in current directory</button>
                            <button class="suggestion" onclick="useSuggestion(this)">Show git status</button>
                            <button class="suggestion" onclick="useSuggestion(this)">Find all Java files</button>
                            <button class="suggestion" onclick="useSuggestion(this)">Help me write a function</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <div class="input-box">
                        <textarea id="input" placeholder="Ask me anything..." rows="1" onkeydown="handleKey(event)"></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </div>
                    <div class="input-hint">Press Enter to send, Shift+Enter for new line</div>
                </div>
            </div>
        </main>
    </div>

    <button class="scroll-bottom" id="scrollBottom" onclick="scrollToBottom()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </button>

    <script>
        let currentSessionId = 'web-' + Date.now();
        let isProcessing = false;
        let messagesContainer = null;
        let abortController = null;
        let lastUserMessage = '';
        let streamingAnswerEl = null;
        let streamingContent = '';
        let renderDebounceTimer = null;

        function init() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.dataset.theme = saved;
            updateThemeIcon(saved);

            messagesContainer = document.querySelector('.messages-inner');
            const textarea = document.getElementById('input');
            textarea.addEventListener('input', () => {
                autoResize(textarea);
                if (!isProcessing) document.getElementById('sendBtn').disabled = !textarea.value.trim();
            });

            // Scroll listener for scroll-to-bottom button
            const messagesDiv = document.getElementById('messages');
            messagesDiv.addEventListener('scroll', () => {
                const btn = document.getElementById('scrollBottom');
                const atBottom = messagesDiv.scrollTop + messagesDiv.clientHeight >= messagesDiv.scrollHeight - 100;
                btn.classList.toggle('visible', !atBottom);
            });

            // Keyboard shortcut: Ctrl+/ or Escape to focus input
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey && e.key === '/') || (e.key === 'Escape' && !isProcessing)) {
                    e.preventDefault();
                    textarea.focus();
                }
            });

            loadSessions();
        }

        // ============ Theme ============
        function toggleTheme() {
            const current = document.documentElement.dataset.theme || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.dataset.theme = next;
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (theme === 'light') {
                icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
            } else {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
            }
        }

        // ============ Mobile Sidebar ============
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }

        function closeSidebar() {
            document.querySelector('.sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
        }

        // ============ Sessions ============
        function newSession() {
            currentSessionId = 'web-' + Date.now();
            messagesContainer.innerHTML = '';
            showWelcome();
            document.getElementById('chatTitle').textContent = 'New Conversation';
            loadSessions();
            closeSidebar();
        }

        function showWelcome() {
            messagesContainer.innerHTML = `
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">M</div>
                    <h2>MiMo Code Agent</h2>
                    <p>Powered by Xiaomi MiMo v2.5 Pro. I can help you read, write, and search code, execute commands, manage git, and more.</p>
                    <div class="suggestions">
                        <button class="suggestion" onclick="useSuggestion(this)">List files in current directory</button>
                        <button class="suggestion" onclick="useSuggestion(this)">Show git status</button>
                        <button class="suggestion" onclick="useSuggestion(this)">Find all Java files</button>
                        <button class="suggestion" onclick="useSuggestion(this)">Help me write a function</button>
                    </div>
                </div>`;
        }

        function useSuggestion(btn) {
            document.getElementById('input').value = btn.textContent;
            document.getElementById('sendBtn').disabled = false;
            sendMessage();
        }

        async function loadSessions() {
            try {
                const resp = await fetch('/api/sessions');
                const sessions = await resp.json();
                const list = document.getElementById('sessionList');
                list.innerHTML = '';
                for (const s of sessions) {
                    const div = document.createElement('div');
                    div.className = `session-item ${s === currentSessionId ? 'active' : ''}`;
                    div.dataset.sessionId = s;
                    div.innerHTML = `
                        <svg class="session-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span class="session-name">${escapeHtml(s.substring(0, 24))}</span>
                        <button class="session-delete" title="Delete">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>`;
                    div.addEventListener('click', () => switchSession(s));
                    div.querySelector('.session-delete').addEventListener('click', e => { e.stopPropagation(); deleteSession(s); });
                    list.appendChild(div);
                }
            } catch (e) {}
        }

        async function deleteSession(id) {
            try {
                await fetch(`/api/sessions/${encodeURIComponent(id)}`, { method: 'DELETE' });
                if (id === currentSessionId) newSession();
                loadSessions();
            } catch (e) {}
        }

        async function switchSession(id) {
            currentSessionId = id;
            messagesContainer.innerHTML = '';
            addSystemMessage('Loading messages...');
            document.getElementById('chatTitle').textContent = id.substring(0, 30);
            loadSessions();
            closeSidebar();

            try {
                const resp = await fetch(`/api/sessions/${encodeURIComponent(id)}/messages`);
                if (resp.ok) {
                    const messages = await resp.json();
                    messagesContainer.innerHTML = '';
                    if (messages.length === 0) {
                        showWelcome();
                    } else {
                        messages.forEach(m => {
                            if (m.role === 'tool') {
                                // 渲染工具调用结果
                                if (Array.isArray(m.content)) {
                                    m.content.forEach(tool => {
                                        addToolResult(tool.name, tool.result, false);
                                    });
                                }
                            } else if (m.role === 'assistant' && m.toolCalls) {
                                // 渲染带工具调用的助手消息
                                addMessage(m.role, m.content);
                                m.toolCalls.forEach(tc => {
                                    addToolCall(tc.name, tc.arguments);
                                });
                            } else {
                                addMessage(m.role, m.content);
                            }
                        });
                    }
                } else {
                    messagesContainer.innerHTML = '';
                    showWelcome();
                }
            } catch (e) {
                messagesContainer.innerHTML = '';
                showWelcome();
            }
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (document.getElementById('input').value.trim()) sendMessage();
            }
        }

        // ============ Send / Stop ============
        async function sendMessage() {
            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message || isProcessing) return;

            isProcessing = true;
            lastUserMessage = message;
            abortController = new AbortController();

            // Switch to stop mode
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = false;
            sendBtn.classList.add('stop-mode');
            sendBtn.onclick = stopGeneration;
            sendBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';

            const welcome = document.getElementById('welcome');
            if (welcome) welcome.remove();

            addMessage('user', message);
            document.getElementById('chatTitle').textContent = message.substring(0, 40) + (message.length > 40 ? '...' : '');

            const typingEl = addTyping();
            input.value = '';
            autoResize(input);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, sessionId: currentSessionId }),
                    signal: abortController.signal
                });

                typingEl.remove();

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            try {
                                handleSSEEvent(JSON.parse(line.substring(5).trim()));
                            } catch (e) {}
                        }
                    }
                }
            } catch (error) {
                typingEl.remove();
                if (error.name === 'AbortError') {
                    addSystemMessage('Generation stopped');
                    finalizeAnswer();
                } else {
                    addSystemMessage('Error: ' + error.message);
                }
            } finally {
                resetSendButton();
                loadSessions();
            }
        }

        function stopGeneration() {
            if (abortController) {
                abortController.abort();
                abortController = null;
            }
        }

        function resetSendButton() {
            isProcessing = false;
            abortController = null;
            const sendBtn = document.getElementById('sendBtn');
            const input = document.getElementById('input');
            sendBtn.classList.remove('stop-mode');
            sendBtn.disabled = !input.value.trim();
            sendBtn.onclick = sendMessage;
            sendBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
            input.focus();
        }

        // ============ SSE Events ============
        function handleSSEEvent(data) {
            switch (data.type) {
                case 'TOOL_CALL': addToolCall(data.toolName, data.content); break;
                case 'TOOL_RESULT': addToolResult(data.toolName, data.content, data.isError); break;
                case 'THINKING': addThinking(data.content); break;
                case 'ANSWER_CHUNK': appendAnswerChunk(data.content); break;
                case 'DONE': finalizeAnswer(); break;
                case 'ERROR': addSystemMessage(data.content, true); break;
            }
        }

        // ============ Message Rendering ============
        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            const avatarText = role === 'user' ? 'U' : 'M';
            div.innerHTML = `
                <div class="msg-actions">
                    <button class="msg-action-btn" onclick="copyMessage(this)" title="Copy">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>
                    ${role === 'user' ? `<button class="msg-action-btn" onclick="regenerate()" title="Regenerate">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    </button>` : ''}
                </div>
                <div class="msg-avatar">${avatarText}</div>
                <div class="msg-body">
                    <div class="msg-role">${role === 'user' ? 'You' : 'MiMo'}</div>
                    <div class="msg-content">${role === 'assistant' ? renderMarkdown(content) : escapeHtml(content)}</div>
                </div>`;
            messagesContainer.appendChild(div);
            if (role === 'assistant') enhanceCodeBlocks(div);
            scrollToBottom();
        }

        function appendAnswerChunk(chunk) {
            if (!streamingAnswerEl) {
                streamingAnswerEl = document.createElement('div');
                streamingAnswerEl.className = 'msg assistant';
                streamingAnswerEl.innerHTML = `
                    <div class="msg-actions">
                        <button class="msg-action-btn" onclick="copyMessage(this)" title="Copy">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        </button>
                    </div>
                    <div class="msg-avatar">M</div>
                    <div class="msg-body">
                        <div class="msg-role">MiMo</div>
                        <div class="msg-content streaming-cursor"></div>
                    </div>`;
                messagesContainer.appendChild(streamingAnswerEl);
                streamingContent = '';
            }
            streamingContent += chunk;

            // Append raw text immediately for typewriter effect (preserves existing HTML)
            const contentEl = streamingAnswerEl.querySelector('.msg-content');
            contentEl.insertAdjacentText('beforeend', chunk);
            scrollToBottom();

            // Debounce markdown rendering
            clearTimeout(renderDebounceTimer);
            renderDebounceTimer = setTimeout(() => {
                contentEl.innerHTML = renderMarkdown(streamingContent);
                enhanceCodeBlocks(streamingAnswerEl);
            }, 100);
        }

        function finalizeAnswer() {
            clearTimeout(renderDebounceTimer);
            if (streamingAnswerEl) {
                const contentEl = streamingAnswerEl.querySelector('.msg-content');
                contentEl.innerHTML = renderMarkdown(streamingContent);
                contentEl.classList.remove('streaming-cursor');
                enhanceCodeBlocks(streamingAnswerEl);
                streamingAnswerEl = null;
                streamingContent = '';
            }
        }

        // ============ Tool Calls ============
        function addToolCall(name, args) {
            const div = document.createElement('div');
            div.className = 'tool-call';
            div.innerHTML = `
                <div class="tool-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <span class="tool-icon running">⚙</span>
                    <span class="tool-name">${escapeHtml(name)}</span>
                    <span class="tool-status running">Running</span>
                    <span class="tool-chevron">▶</span>
                </div>
                <div class="tool-body">${escapeHtml(args)}</div>`;
            messagesContainer.appendChild(div);
            scrollToBottom();
        }

        function addToolResult(name, output, isError) {
            const div = document.createElement('div');
            div.className = 'tool-call';
            div.innerHTML = `
                <div class="tool-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <span class="tool-icon">${isError ? '✗' : '✓'}</span>
                    <span class="tool-name">${escapeHtml(name)}</span>
                    <span class="tool-status ${isError ? 'error' : 'success'}">${isError ? 'Error' : 'Done'}</span>
                    <span class="tool-chevron">▶</span>
                </div>
                <div class="tool-body">${escapeHtml(output).substring(0, 2000)}${output.length > 2000 ? '\n... (truncated)' : ''}</div>`;
            messagesContainer.appendChild(div);
            scrollToBottom();
        }

        function addThinking(content) {
            let existing = messagesContainer.querySelector('.thinking:last-of-type');
            if (!existing) {
                existing = document.createElement('div');
                existing.className = 'thinking';
                messagesContainer.appendChild(existing);
            }
            existing.textContent += content;
            scrollToBottom();
        }

        function addSystemMessage(text, isError) {
            const div = document.createElement('div');
            div.className = 'msg-system' + (isError ? ' error' : '');
            div.textContent = text;
            messagesContainer.appendChild(div);
            scrollToBottom();
        }

        function addTyping() {
            const div = document.createElement('div');
            div.className = 'msg assistant';
            div.innerHTML = `
                <div class="msg-avatar">M</div>
                <div class="msg-body">
                    <div class="msg-role">MiMo</div>
                    <div class="typing"><span></span><span></span><span></span></div>
                </div>`;
            messagesContainer.appendChild(div);
            scrollToBottom();
            return div;
        }

        // ============ Message Actions ============
        function copyMessage(btn) {
            const msgBody = btn.closest('.msg').querySelector('.msg-content');
            navigator.clipboard.writeText(msgBody.textContent).then(() => {
                btn.classList.add('copied');
                btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
                }, 2000);
            });
        }

        function regenerate() {
            if (!lastUserMessage || isProcessing) return;
            document.getElementById('input').value = lastUserMessage;
            // Remove the last user message and assistant response
            const msgs = messagesContainer.querySelectorAll('.msg');
            if (msgs.length >= 2) {
                const last = msgs[msgs.length - 1];
                const secondLast = msgs[msgs.length - 2];
                if (last.classList.contains('assistant')) last.remove();
                if (secondLast.classList.contains('user')) secondLast.remove();
            }
            sendMessage();
        }

        // ============ Code Block Enhancements ============
        function enhanceCodeBlocks(container) {
            container.querySelectorAll('pre:not([data-enhanced])').forEach(pre => {
                pre.dataset.enhanced = 'true';

                const code = pre.querySelector('code');
                if (!code) return;

                // Extract language from data-lang attribute set by renderMarkdown
                let lang = pre.dataset.lang || '';
                const text = code.textContent;

                // Add line numbers
                const lines = text.split('\n');
                // Remove trailing empty line if exists
                if (lines[lines.length - 1] === '') lines.pop();
                code.innerHTML = lines.map((line, i) =>
                    `<span class="code-line" data-line="${i + 1}">${escapeHtml(line)}</span>`
                ).join('\n');

                // Build code header
                const header = document.createElement('div');
                header.className = 'code-header';

                const langLabel = document.createElement('span');
                langLabel.className = 'code-lang';
                langLabel.textContent = lang || 'code';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
                copyBtn.onclick = (e) => {
                    e.stopPropagation();
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.classList.add('copied');
                        copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
                        setTimeout(() => {
                            copyBtn.classList.remove('copied');
                            copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
                        }, 2000);
                    });
                };

                header.appendChild(langLabel);
                header.appendChild(copyBtn);
                pre.insertBefore(header, code);
            });
        }

        // ============ Markdown Renderer ============
        function renderMarkdown(text) {
            let html = escapeHtml(text);

            // Code blocks with language (must be first to prevent inner processing)
            const codeBlocks = [];
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                const placeholder = `__CODE_BLOCK_${codeBlocks.length}__`;
                codeBlocks.push(`<pre data-lang="${lang}"><code>${code}</code></pre>`);
                return placeholder;
            });

            // Inline code
            const inlineCodes = [];
            html = html.replace(/`([^`]+)`/g, (match, code) => {
                const placeholder = `__INLINE_CODE_${inlineCodes.length}__`;
                inlineCodes.push(`<code>${code}</code>`);
                return placeholder;
            });

            // Tables
            html = html.replace(/^\|(.+)\|\s*\n\|[-\s|:]+\|\s*\n((?:\|.+\|\s*\n?)*)/gm, (match, header, body) => {
                const headers = header.split('|').map(h => h.trim()).filter(h => h);
                const rows = body.trim().split('\n').map(row =>
                    row.split('|').map(cell => cell.trim()).filter(cell => cell)
                );

                let table = '<table><thead><tr>';
                headers.forEach(h => table += `<th>${h}</th>`);
                table += '</tr></thead><tbody>';
                rows.forEach(row => {
                    table += '<tr>';
                    row.forEach(cell => table += `<td>${cell}</td>`);
                    table += '</tr>';
                });
                table += '</tbody></table>';
                return table;
            });

            // Headers
            html = html.replace(/^###### (.*$)/gm, '<h6>$1</h6>');
            html = html.replace(/^##### (.*$)/gm, '<h5>$1</h5>');
            html = html.replace(/^#### (.*$)/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');

            // Horizontal rule
            html = html.replace(/^---+$/gm, '<hr>');

            // Blockquote
            html = html.replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>');

            // Bold and italic
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/~~(.*?)~~/g, '<del>$1</del>');

            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
            html = html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');

            // Unordered lists
            html = html.replace(/^(\s*)[-*] (.*$)/gm, '$1<li>$2</li>');
            html = html.replace(/((?:<li>.*<\/li>\s*)+)/g, '<ul>$1</ul>');

            // Ordered lists
            html = html.replace(/^\d+\. (.*$)/gm, '<oli>$1</oli>');
            html = html.replace(/((?:<oli>.*<\/oli>\s*)+)/g, (match) => {
                return '<ol>' + match.replace(/<oli>/g, '<li>').replace(/<\/oli>/g, '</li>') + '</ol>';
            });

            // Line breaks (but not inside lists)
            html = html.replace(/\n/g, '<br>');
            html = html.replace(/<\/ul><br><ul>/g, '');
            html = html.replace(/<br><\/ul>/g, '</ul>');
            html = html.replace(/<ul><br>/g, '<ul>');
            html = html.replace(/<\/ol><br><ol>/g, '');
            html = html.replace(/<br><\/ol>/g, '</ol>');
            html = html.replace(/<ol><br>/g, '<ol>');

            // Restore code blocks
            codeBlocks.forEach((block, i) => {
                html = html.replace(`__CODE_BLOCK_${i}__`, block);
            });
            inlineCodes.forEach((code, i) => {
                html = html.replace(`__INLINE_CODE_${i}__`, code);
            });

            return html;
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function scrollToBottom() {
            const m = document.getElementById('messages');
            m.scrollTop = m.scrollHeight;
            document.getElementById('scrollBottom').classList.remove('visible');
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 200) + 'px';
        }

        init();
    </script>
</body>
